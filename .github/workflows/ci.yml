name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.30.0"
  NODE_VERSION: "22"

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Type-check, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          # Tests use pure functions — no DB needed; stub the URL to satisfy dotenv
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          REFRESH_TOKEN_SECRET: ci-test-refresh-secret-at-least-32-characters-long

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check, Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc -p tsconfig.app.json --noEmit

      - name: Lint (zero errors)
        # Exit code 1 only on actual errors; warnings are allowed
        run: pnpm exec eslint src --ext .ts,.tsx

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
