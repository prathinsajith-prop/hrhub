version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: hrhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrhub
      POSTGRES_USER: hrhub_user
      POSTGRES_PASSWORD: hrhub_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hrhub_user -d hrhub" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrhub_redis
    restart: unless-stopped
    command: redis-server --requirepass hrhub_redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "hrhub_redis_secret", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
